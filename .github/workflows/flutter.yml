name: Flutter CI

on:
  push:
    paths:
      - "food_guide_app/**"
      - ".github/workflows/flutter.yml"
  pull_request:
    paths:
      - "food_guide_app/**"
      - ".github/workflows/flutter.yml"

defaults:
  run:
    working-directory: food_guide_app

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
