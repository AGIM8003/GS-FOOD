name: food_guide_app
description: Food Guide App — camera-first storage & use-first assistant (GS-FOOD3 blueprint).
publish_to: "none"
version: 0.2.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.1.0
  crypto: ^3.0.6
  cryptography: ^2.7.0
  cupertino_icons: ^1.0.8
  google_mlkit_text_recognition: ^0.14.0
  google_mlkit_document_scanner: ^0.4.0
  http: ^1.2.2
  image_picker: ^1.1.2
  mobile_scanner: ^6.0.2
  openfoodfacts: ^3.21.0
  path: ^1.9.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  share_plus: ^10.1.2
  shared_preferences: ^2.3.3
  sqflite: ^2.4.1
  tflite_flutter: ^0.11.0
  uuid: ^4.5.1
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/packs/v0/
    - assets/config/
    - assets/models/
