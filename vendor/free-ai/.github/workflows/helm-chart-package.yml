# Packages deploy/helm/free-ai on demand. Push to OCI + Cosign in your org pipeline (see docs/HELM_GITOPS.md).
name: Helm chart package

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Lint chart
        run: helm lint deploy/helm/free-ai
      - name: Package chart
        run: |
          mkdir -p dist
          helm package deploy/helm/free-ai --destination dist
      - name: Upload chart tarball
        uses: actions/upload-artifact@v4
        with:
          name: free-ai-helm-chart
          path: dist/*.tgz
