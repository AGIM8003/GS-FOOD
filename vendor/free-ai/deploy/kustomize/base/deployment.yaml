apiVersion: apps/v1
kind: Deployment
metadata:
  name: free-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: free-ai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: free-ai
    spec:
      containers:
        - name: engine
          image: ghcr.io/example/free-ai-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: FREEAI_BIND_HOST
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
