# Example: extend your pipeline to sign the packaged Helm chart with Cosign (keyless or key-pair).
# Copy into .github/workflows/ in YOUR org repo; set permissions and OIDC for keyless signing.
# This file is documentation-only — not executed from this path.

name: Sign Helm chart (example)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  sign-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Package chart
        run: |
          mkdir -p dist
          helm package deploy/helm/free-ai --destination dist

      # Keyless (GitHub OIDC) — configure your org trust root in Sigstore
      - name: Sign chart tarball
        run: cosign sign-blob --yes dist/*.tgz --bundle dist/chart.cosign.bundle

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart-signed
          path: |
            dist/*.tgz
            dist/*.bundle
