# OpenTelemetry Collector — skeleton only (not a complete production config).
# Docs: https://opentelemetry.io/docs/collector/configuration/

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  debug:
    verbosity: basic
  # otlphttp:
  #   endpoint: https://your-vendor.example/otlp
  #   headers:
  #     api-key: ${env:OTEL_VENDOR_KEY}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
